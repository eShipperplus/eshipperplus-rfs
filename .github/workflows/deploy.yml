name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: eshipper-f56c3
  SERVICE: eshipperplus-rfs
  REGION: northamerica-northeast1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # We use --async + a polling loop instead of letting `gcloud builds submit`
      # stream logs, because the CI service account hits an opaque
      # "Viewer/Owner" precheck on log streaming even when the project Viewer
      # role is granted. Full build logs remain available in Cloud Build Console.
      - name: Submit Cloud Build
        id: build
        run: |
          BUILD_ID=$(gcloud builds submit \
            --tag gcr.io/$PROJECT_ID/$SERVICE \
            --project $PROJECT_ID \
            --async \
            --format='value(id)')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Build started: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=$PROJECT_ID"

      - name: Wait for build to finish
        run: |
          BUILD_ID="${{ steps.build.outputs.build_id }}"
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --project $PROJECT_ID --format='value(status)')
            echo "[$(date -u +%H:%M:%S)] Build $BUILD_ID: $STATUS"
            case "$STATUS" in
              SUCCESS) echo "Build succeeded"; exit 0 ;;
              FAILURE|TIMEOUT|CANCELLED|INTERNAL_ERROR|EXPIRED)
                echo "Build ended with status: $STATUS"
                echo "Logs: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=$PROJECT_ID"
                exit 1 ;;
            esac
            sleep 10
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image gcr.io/$PROJECT_ID/$SERVICE \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 10 \
            --set-env-vars LOGIWA_ESHIPPER_WH_IDENTIFIER=8320f545-d1d3-4bbc-bf08-b44d11c93b94 \
            --set-secrets FIREBASE_SERVICE_ACCOUNT=FIREBASE_SA_JSON:latest,LOGIWA_EMAIL=LOGIWA_EMAIL:latest,LOGIWA_PASSWORD=LOGIWA_PASSWORD:latest \
            --project $PROJECT_ID
