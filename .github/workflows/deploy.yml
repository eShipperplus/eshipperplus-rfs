name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: eshipper-f56c3
  SERVICE: eshipperplus-rfs
  REGION: northamerica-northeast1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: |
          gcloud builds submit \
            --tag gcr.io/$PROJECT_ID/$SERVICE \
            --project $PROJECT_ID \
            --suppress-logs

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image gcr.io/$PROJECT_ID/$SERVICE \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 10 \
            --set-env-vars LOGIWA_ESHIPPER_WH_IDENTIFIER=8320f545-d1d3-4bbc-bf08-b44d11c93b94 \
            --set-secrets FIREBASE_SERVICE_ACCOUNT=FIREBASE_SA_JSON:latest,LOGIWA_EMAIL=LOGIWA_EMAIL:latest,LOGIWA_PASSWORD=LOGIWA_PASSWORD:latest \
            --project $PROJECT_ID
