<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#34368a" />
  <title>eShipper+ RFS</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RFS" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* === DESIGN TOKENS (from eShipper+ design system) === */
    :root {
      --color-primary: #34368a;
      --color-primary-hover: #2a2c70;
      --color-primary-active: #1f2156;
      --color-primary-light: #e8e9f3;
      --color-secondary: #62c0ae;
      --color-secondary-light: #e0f3ee;

      --color-white: #ffffff;
      --color-gray-50: #f8f8f9;
      --color-gray-100: #f1f1f3;
      --color-gray-200: #e6e7e8;
      --color-gray-300: #d1d2d6;
      --color-gray-400: #a8a9b0;
      --color-gray-500: #75767e;
      --color-gray-600: #5a5b63;
      --color-gray-700: #3f4047;
      --color-gray-800: #28292e;
      --color-gray-900: #16171a;

      --color-success: #2f9e6f;
      --color-success-light: #e3f5ec;
      --color-warning: #d48910;
      --color-warning-light: #fdf3dc;
      --color-warning-hover: #a86d0a;
      --color-error: #c8344a;
      --color-error-light: #fbe6e9;
      --color-info: #2b6cb0;
      --color-info-light: #e1ecf7;

      --color-bg-page: var(--color-gray-50);
      --color-bg-surface: var(--color-white);
      --color-bg-subtle: var(--color-gray-100);
      --color-text-primary: var(--color-gray-900);
      --color-text-secondary: var(--color-gray-600);
      --color-text-muted: var(--color-gray-500);
      --color-border: var(--color-gray-300);
      --color-border-subtle: var(--color-gray-200);

      --font-family-base: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

      --radius-sm: 0.25rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-full: 9999px;

      --shadow-sm: 0 1px 3px 0 rgba(22,23,26,0.08), 0 1px 2px 0 rgba(22,23,26,0.04);
      --shadow-md: 0 4px 6px -1px rgba(22,23,26,0.08), 0 2px 4px -1px rgba(22,23,26,0.04);
      --shadow-focus: 0 0 0 3px rgba(52,54,138,0.25);

      --transition-fast: 150ms ease-in-out;
    }

    /* === BASE === */
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      font-family: var(--font-family-base);
      background: var(--color-bg-page);
      color: var(--color-text-primary);
      line-height: 1.5;
      height: 100%;
      -webkit-font-smoothing: antialiased;
    }
    button { font: inherit; cursor: pointer; }
    input, select, button { font: inherit; }
    a { color: var(--color-primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* === TOP NAV === */
    .topbar {
      background: var(--color-primary);
      color: var(--color-white);
      padding: 10px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 5;
      min-height: 64px;
      box-shadow: var(--shadow-sm);
    }
    .topbar h1 { font-size: 18px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
    .topbar .brand { display: flex; align-items: center; gap: 12px; }
    /* The SVG is the dark-banner brand logo: white circle badge + purple swirl +
       white wordmark + teal "+". It's designed to sit directly on a dark/indigo
       surface with NO filter — exactly how the WMS Productivity dashboard renders it. */
    .topbar .brand img { height: 34px; width: auto; display: block; }
    .topbar .brand .tag {
      font-size: 12px; font-weight: 600; letter-spacing: 0.12em;
      opacity: 0.9; text-transform: uppercase;
      padding-left: 12px; border-left: 1px solid rgba(255,255,255,0.25);
      color: #ffffff;
    }
    .topbar .who { font-size: 13px; opacity: 0.9; color: #ffffff; }

    /* === TABS === */
    .tabs {
      display: flex;
      background: var(--color-bg-surface);
      border-bottom: 1px solid var(--color-border-subtle);
      position: sticky; top: 64px; z-index: 4;
    }
    .tabs button {
      flex: 1;
      padding: 14px 8px;
      border: none;
      background: transparent;
      color: var(--color-text-secondary);
      font-weight: 500;
      font-size: 14px;
      border-bottom: 2px solid transparent;
      transition: color var(--transition-fast), border-color var(--transition-fast);
    }
    .tabs button:hover { color: var(--color-text-primary); }
    .tabs button.active {
      color: var(--color-primary);
      font-weight: 600;
      border-bottom-color: var(--color-primary);
    }
    .tabs button:focus-visible {
      outline: none;
      box-shadow: var(--shadow-focus);
      border-radius: var(--radius-sm);
    }

    /* === CONTAINER === */
    .container { max-width: 720px; margin: 0 auto; padding: 16px; padding-bottom: 80px; }
    .container.wide { max-width: 1400px; }
    .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; align-items: center; }

    /* === CARD === */
    .card {
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
    }
    .card h3 { margin: 0 0 8px; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
    .card .meta { font-size: 13px; color: var(--color-text-secondary); line-height: 1.5; }

    /* === BADGES (state pills) === */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge.awaiting { background: var(--color-warning-light); color: var(--color-warning-hover); }
    .badge.staged   { background: var(--color-primary-light); color: var(--color-primary); }
    .badge.loading  { background: #fde2c8; color: #8a4500; }
    .badge.loaded   { background: var(--color-success-light); color: var(--color-success); }
    .badge.shipped  { background: var(--color-gray-200); color: var(--color-text-secondary); }

    /* === ROW HELPERS === */
    .row { display: flex; gap: 8px; align-items: center; }
    .row + .row { margin-top: 6px; }
    .grow { flex: 1; }

    /* === BUTTONS === */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      background: var(--color-primary);
      color: var(--color-white);
      font-weight: 600;
      font-size: 14px;
      min-height: 44px;
      transition: background var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
    }
    .btn:hover { background: var(--color-primary-hover); }
    .btn:active { background: var(--color-primary-active); }
    .btn:focus-visible { outline: none; box-shadow: var(--shadow-focus); }
    .btn.secondary {
      background: var(--color-bg-surface);
      color: var(--color-primary);
      border-color: var(--color-primary);
    }
    .btn.secondary:hover { background: var(--color-primary-light); }
    .btn.danger { background: var(--color-error); }
    .btn.danger:hover { background: #a02b3d; }
    .btn.full { width: 100%; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* === INPUTS === */
    input[type=text], input[type=number], input[type=email], input[type=password], input[type=date], select, textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: 16px;
      background: var(--color-bg-surface);
      color: var(--color-text-primary);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    input[type=text]:focus, input[type=number]:focus, input[type=email]:focus, input[type=password]:focus, input[type=date]:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: var(--shadow-focus);
    }
    label {
      font-size: 13px;
      color: var(--color-text-secondary);
      font-weight: 600;
      display: block;
      margin: 10px 0 4px;
    }

    /* === TOAST === */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-gray-900);
      color: var(--color-white);
      padding: 12px 18px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      z-index: 100;
      box-shadow: var(--shadow-md);
    }
    .toast.error { background: var(--color-error); }

    /* === LOADER / EMPTY === */
    .loader { text-align: center; color: var(--color-text-muted); padding: 24px; }
    .empty { text-align: center; color: var(--color-text-muted); padding: 40px 20px; }

    /* === SCANNER === */
    .scanner-wrap { background: #000; border-radius: var(--radius-md); overflow: hidden; aspect-ratio: 1 / 1; }
    #qr-reader { width: 100%; }

    /* === PALLET ROW === */
    .pallet-row {
      background: var(--color-gray-50);
      padding: 12px 14px;
      border-radius: var(--radius-md);
      margin-bottom: 8px;
      border: 1px solid var(--color-border-subtle);
    }
    .pallet-row .row { gap: 6px; }
    .pallet-row .palletNo { font-weight: 700; color: var(--color-primary); min-width: 42px; }
    .pallet-row .loc { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 14px; }

    /* === LOGIN === */
    .login-screen { padding: 40px 16px; text-align: center; }
    .login-screen h1 {
      color: var(--color-primary);
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .login-form input { margin-bottom: 8px; }
    .hint { font-size: 12px; color: var(--color-text-muted); margin-top: 8px; }

    /* === REPORTS SUB-TABS (used by renderAdmin) === */
    .reports-subtab {
      flex: 1;
      min-width: 90px;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: var(--color-primary);
      font-weight: 600;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 14px;
      transition: background var(--transition-fast), color var(--transition-fast);
    }
    .reports-subtab:hover { background: var(--color-primary-light); }
    .reports-subtab.active {
      background: var(--color-primary);
      color: var(--color-white);
    }

    @media (min-width: 720px) {
      .container { padding: 24px; }
    }
  </style>
</head>
<body>
  <div id="boot-loader" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#f8f8f9;z-index:1000">
    <div style="background:#34368a;border-radius:14px;padding:14px 20px;margin-bottom:10px;display:inline-flex"><img src="/logo-eshipper.svg" alt="eShipper+" style="height:40px;max-width:240px;object-fit:contain" /></div>
    <div style="font-size:11px;font-weight:700;letter-spacing:0.18em;color:#34368a;text-transform:uppercase">RFS</div>
    <div id="boot-status" style="color:#75767e;font-size:14px;text-align:center;max-width:320px;padding:16px 16px 0">Loading…</div>
  </div>

  <div id="login" style="display:none">
    <div class="login-screen">
      <div style="background:#34368a;border-radius:16px;padding:16px 24px;margin:0 auto 10px;display:inline-flex"><img src="/logo-eshipper.svg" alt="eShipper+" style="height:46px;max-width:260px;object-fit:contain" /></div>
      <div style="font-size:12px;font-weight:700;letter-spacing:0.18em;color:#34368a;text-transform:uppercase;margin-bottom:6px">RFS</div>
      <p class="hint" style="margin-top:0">Putaway and dispatch tracking</p>
      <div class="login-form" style="max-width: 320px; margin: 24px auto 0">
        <button class="btn full" id="btn-google">Sign in with Google</button>
        <p class="hint" style="margin-top:16px">Or sign in with email + password:</p>
        <input type="email" id="login-email" placeholder="email" />
        <input type="password" id="login-password" placeholder="password" />
        <button class="btn full secondary" id="btn-email">Sign in</button>
      </div>
    </div>
  </div>

  <div id="app" style="display:none">
    <div class="topbar">
      <div class="brand">
        <img src="/logo-eshipper.svg" alt="eShipper+" />
        <span class="tag">RFS</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="who" id="who"></span>
        <button id="btn-signout" style="background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.35);border-radius:6px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 150ms">Sign out</button>
      </div>
    </div>
    <nav class="tabs" id="tabs">
      <button data-view="scan" class="active">Scan</button>
      <button data-view="queue" id="tab-queue">Queue</button>
      <button data-view="receive">Receive PO</button>
      <button data-view="admin" id="tab-admin" style="display:none">Reports</button>
    </nav>
    <div class="container" id="view"></div>
  </div>

  <div id="toast-host"></div>

  <!-- Install prompt banner — shown when the browser fires beforeinstallprompt -->
  <div id="install-banner" style="display:none;position:fixed;bottom:16px;left:16px;right:16px;max-width:480px;margin:0 auto;background:#34368a;color:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 4px 16px rgba(0,0,0,0.25);z-index:90;align-items:center;gap:10px;font-size:14px">
    <img src="/icon-192.png" alt="" style="height:32px;width:32px;border-radius:6px;background:#fff;padding:2px" />
    <div style="flex:1">
      <div style="font-weight:600">Install eShipper+ RFS</div>
      <div style="font-size:12px;opacity:0.85">Add to home screen for full-screen mode + faster access</div>
    </div>
    <button id="btn-install" style="background:#fff;color:#34368a;border:none;border-radius:6px;padding:8px 14px;font-weight:600;cursor:pointer">Install</button>
    <button id="btn-install-dismiss" style="background:transparent;color:#fff;border:none;font-size:18px;cursor:pointer;line-height:1;padding:4px 8px">×</button>
  </div>

  <script>
    // Service worker registration — gives us offline app shell + installability.
    // We force an update check on every load so a new deploy can't be masked by stale cache.
    if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then((reg) => {
          reg.update().catch(() => {});
          // When a new SW takes over, reload once so the new app shell wins
          let refreshed = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshed) return;
            refreshed = true;
            window.location.reload();
          });
        }).catch((err) => console.warn('SW register failed:', err));
      });
    }

    // Install prompt — Chrome/Edge fire `beforeinstallprompt` once the PWA criteria pass.
    let _deferredInstall = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      _deferredInstall = e;
      // Don't push install on the login screen — wait until the user is in the app
      const showWhenInApp = () => {
        if (document.getElementById('app').style.display !== 'none' && !sessionStorage.getItem('rfs-install-dismissed')) {
          document.getElementById('install-banner').style.display = 'flex';
        } else {
          setTimeout(showWhenInApp, 1500);
        }
      };
      showWhenInApp();
    });
    document.addEventListener('DOMContentLoaded', () => {
      const banner = document.getElementById('install-banner');
      document.getElementById('btn-install')?.addEventListener('click', async () => {
        if (!_deferredInstall) return;
        _deferredInstall.prompt();
        await _deferredInstall.userChoice;
        _deferredInstall = null;
        banner.style.display = 'none';
      });
      document.getElementById('btn-install-dismiss')?.addEventListener('click', () => {
        sessionStorage.setItem('rfs-install-dismissed', '1');
        banner.style.display = 'none';
      });
    });
  </script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
